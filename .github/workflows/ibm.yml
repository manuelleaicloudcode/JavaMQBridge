name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Job 1: Run standard unit tests
  test:
    name: Java Unit Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Run Tests
      run: mvn test

  # Job 2: Package MQ dependencies and build Docker image
  mq-build:
    name: MQ Package & Docker Build
    runs-on: ubuntu-latest
    needs: test # Waits for tests to pass first
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Package MQ Application
      run: |
        echo "Packaging application with IBM MQ dependencies..."
        mvn package -DskipTests

    - name: Build MQ Docker Image
      run: docker build -t java-mq-bridge:${{ github.sha }} .
